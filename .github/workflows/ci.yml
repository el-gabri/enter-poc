name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Tests (offline - mock LLM provider)
        run: pytest -q
      - name: Evaluation harness smoke test
        env:
          LITIGATION_LLM_PROVIDER: mock
          LITIGATION_VECTOR_STORE: memory
        run: python -m app.evaluation eval_data
